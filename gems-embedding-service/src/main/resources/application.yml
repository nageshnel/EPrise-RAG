server:
  port: 8082
spring:
  application:
    name: gems-embedding-service
  datasource:
    url: jdbc:postgresql://localhost:5432/gems_ai
    username: gems
    password: gems
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.v76.gems.events
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      embedding:
        options:
          model: ${SPRING_AI_EMBEDDING_MODEL:text-embedding-3-small}
spring.cloud.kubernetes.discovery.enabled: true
ai:
  embedding-api:
    dimensions: ${EMBEDDING_DIMENSIONS:1536}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
