syntax = "proto3";

package com.v76.eprise.ocr.grpc;

option java_multiple_files = true;
option java_package = "com.v76.eprise.ocr.grpc";

service OcrGrpcService {
    rpc ExtractText (OcrRequest) returns (OcrResponse);
}

message OcrRequest {
    bytes file_bytes = 1;
    string filename = 2;
    string content_type = 3;
}

message OcrResponse {
    string text = 1;
}
