syntax = "proto3";

package com.v76.eprise.retrieval.grpc;

option java_multiple_files = true;
option java_package = "com.v76.eprise.retrieval.grpc";

service RetrievalGrpcService {
    rpc Retrieve (RetrievalRequest) returns (RetrievalResponse);
}

message RetrievalRequest {
    string query = 1;
    int32 top_k = 2;
}

message RetrievalResponse {
    repeated SearchResult chunks = 1;
}

message SearchResult {
    string chunk_id = 1;
    string source_id = 2;
    string source_type = 3;
    int32 sequence = 4;
    string content = 5;
    double distance = 6;
    string metadata_json = 7;
}
