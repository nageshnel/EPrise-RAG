server:
  port: 8080
spring:
  application:
    name: eprise-api-gateway
  profiles:
    active: dev
gateway:
  security:
    api-key-header: X-API-Key
    api-key: ${GATEWAY_API_KEY:change-me}
  jwt:
    secret: ${JWT_SECRET:super-secret-key-that-must-be-at-least-256-bits-long-for-HS256-algorithm}
    expiration-ms: 86400000
    issuer: eprise-api-gateway
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
