server:
  port: 8081
spring:
  application:
    name: gems-ai-etl-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
ai:
  chunking:
    strategy: paragraph
    max-segment-size: 1000
    max-overlap-size: 200
tika:
  ocr:
    tesseract-path: ""  # Set this to the path containing your tesseract binary (e.g. "C:\\Program Files\\Tesseract-OCR" on Windows or "/usr/bin" on Linux)
    tessdata-path: ""   # Set this if you need to override the path to the tessdata directory
    strategy: ocr_and_text_extraction # Options: no_ocr, ocr_only, ocr_and_text_extraction, auto
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
