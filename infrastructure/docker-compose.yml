services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: airag-postgres
    environment:
      POSTGRES_DB: gems_ai
      POSTGRES_USER: gems
      POSTGRES_PASSWORD: gems
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  kafka:
    image: bitnami/kafka:3.7
    container_name: airag-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: airag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gems
      MINIO_ROOT_PASSWORD: gems-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  whisper-service:
    image: ghcr.io/openai/whisper-asr-webservice:latest
    container_name: airag-whisper
    environment:
      ASR_MODEL: base
      ASR_ENGINE: openai_whisper
    ports:
      - "8090:9000"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: airag-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  valkey:
    image: valkey/valkey:8.0
    container_name: airag-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

volumes:
  postgres-data:
  minio-data:
  valkey-data:
