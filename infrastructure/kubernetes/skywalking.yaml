apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-oap
  namespace: airag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-oap
  template:
    metadata:
      labels:
        app: skywalking-oap
    spec:
      containers:
        - name: oap
          image: apache/skywalking-oap-server:9.5.0
          ports:
            - containerPort: 11800
              name: grpc
            - containerPort: 12800
              name: http
          env:
            - name: SW_STORAGE
              value: postgresql
            - name: SW_JDBC_DRIVER
              value: org.postgresql.Driver
            - name: SW_STORAGE_PLUGINS_JDBC_CONNECTION_URL
              value: jdbc:postgresql://postgres:5432/eprise_ai
            - name: SW_STORAGE_PLUGINS_JDBC_USER
              value: eprise
            - name: SW_STORAGE_PLUGINS_JDBC_PASSWORD
              value: eprise
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-oap
  namespace: airag
spec:
  selector:
    app: skywalking-oap
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: http
      port: 12800
      targetPort: 12800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-ui
  namespace: airag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-ui
  template:
    metadata:
      labels:
        app: skywalking-ui
    spec:
      containers:
        - name: ui
          image: apache/skywalking-ui:9.5.0
          ports:
            - containerPort: 8080
              name: ui
          env:
            - name: SW_OAP_ADDRESS
              value: http://skywalking-oap:12800
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-ui
  namespace: airag
spec:
  type: LoadBalancer
  selector:
    app: skywalking-ui
  ports:
    - port: 8080
      targetPort: 8080
