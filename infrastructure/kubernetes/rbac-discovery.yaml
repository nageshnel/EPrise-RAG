apiVersion: v1
kind: ServiceAccount
metadata:
  name: airag-discovery
  namespace: airag
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airag-discovery-reader
  namespace: airag
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airag-discovery-reader-binding
  namespace: airag
subjects:
  - kind: ServiceAccount
    name: airag-discovery
    namespace: airag
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airag-discovery-reader
