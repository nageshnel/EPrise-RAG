apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: airag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: gems_ai
            - name: POSTGRES_USER
              value: gems
            - name: POSTGRES_PASSWORD
              value: gems
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: airag
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
