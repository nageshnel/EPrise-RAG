apiVersion: apps/v1
kind: Deployment
metadata:
  name: eprise-api-gateway
  namespace: airag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eprise-api-gateway
  template:
    metadata:
      labels:
        app: eprise-api-gateway
    spec:
      serviceAccountName: airag-discovery
      initContainers:
        - name: sw-agent-sidecar
          image: apache/skywalking-java-agent:8.15.0-java17
          command: ["sh", "-c", "mkdir -p /skywalking/agent && cp -r /skywalking/agent/* /skywalking/agent/"]
          volumeMounts:
            - name: sw-agent-volume
              mountPath: /skywalking/agent
      containers:
        - name: app
          image: airag/eprise-api-gateway:0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: airag-model-api-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/skywalking/agent/skywalking-agent.jar"
            - name: SW_AGENT_NAME
              value: "eprise-api-gateway"
            - name: SW_AGENT_COLLECTOR_BACKEND_SERVICES
              value: "skywalking-oap:11800"
            - name: SPRING_R2DBC_URL
              value: r2dbc:postgresql://postgres:5432/eprise_ai
            - name: SPRING_R2DBC_USERNAME
              value: eprise
            - name: SPRING_R2DBC_PASSWORD
              value: eprise
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: sw-agent-volume
              mountPath: /skywalking/agent
      volumes:
        - name: sw-agent-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eprise-api-gateway
  namespace: airag
spec:
  type: LoadBalancer
  selector:
    app: eprise-api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
