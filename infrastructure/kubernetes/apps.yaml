apiVersion: apps/v1
kind: Deployment
metadata:
  name: gems-api-gateway
  namespace: airag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gems-api-gateway
  template:
    metadata:
      labels:
        app: gems-api-gateway
    spec:
      serviceAccountName: airag-discovery
      containers:
        - name: app
          image: airag/gems-api-gateway:0.1.0
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: airag-model-api-secrets
          env:
            - name: SPRING_R2DBC_URL
              value: r2dbc:postgresql://postgres:5432/gems_ai
            - name: SPRING_R2DBC_USERNAME
              value: gems
            - name: SPRING_R2DBC_PASSWORD
              value: gems
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gems-api-gateway
  namespace: airag
spec:
  type: LoadBalancer
  selector:
    app: gems-api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
