server:
  port: 8084
spring:
  application:
    name: gems-rag-orchestrator-service
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
      chat:
        options:
          model: ${SPRING_AI_CHAT_MODEL:qwen/qwen-3-vl-235b-instruct}
  cloud:
    kubernetes:
      discovery:
        enabled: true
services:
  retrieval:
    url: ${RETRIEVAL_SERVICE_URL:http://localhost:8083}
