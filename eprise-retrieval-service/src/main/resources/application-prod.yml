spring:
  devtools:
    restart:
      enabled: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:valkey}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/eprise_ai}
    username: ${SPRING_DATASOURCE_USERNAME:eprise}
    password: ${SPRING_DATASOURCE_PASSWORD:eprise}
  cloud:
    kubernetes:
      discovery:
        enabled: true
