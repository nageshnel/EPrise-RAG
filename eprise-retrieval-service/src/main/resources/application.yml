server:
  port: 8083
spring:
  application:
    name: eprise-retrieval-service
  profiles:
    active: dev
  cache:
    type: redis
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      embedding:
        options:
          model: ${SPRING_AI_EMBEDDING_MODEL:text-embedding-3-small}
ai:
  retrieval:
    top-k: 5
grpc:
  server:
    port: 9083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
