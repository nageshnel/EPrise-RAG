version: '3.8'

services:
  # Backing services
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gems_ai
      POSTGRES_USER: gems
      POSTGRES_PASSWORD: gems
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      replicas: 1

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gems
      MINIO_ROOT_PASSWORD: gems-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    deploy:
      replicas: 1

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    deploy:
      replicas: 1

  valkey:
    image: valkey/valkey:8.0
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    deploy:
      replicas: 1

  # Microservices
  gems-api-gateway:
    image: ${REGISTRY_PREFIX:-airag}/gems-api-gateway:${TAG:-0.1.0}
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/gems_ai
      SPRING_R2DBC_USERNAME: gems
      SPRING_R2DBC_PASSWORD: gems
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  gems-ai-etl-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-ai-etl-service:${TAG:-0.1.0}
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  gems-media-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-media-service:${TAG:-0.1.0}
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  gems-embedding-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-embedding-service:${TAG:-0.1.0}
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gems_ai
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  gems-retrieval-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-retrieval-service:${TAG:-0.1.0}
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gems_ai
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  gems-rag-orchestrator-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-rag-orchestrator-service:${TAG:-0.1.0}
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  gems-ocr-service:
    image: ${REGISTRY_PREFIX:-airag}/gems-ocr-service:${TAG:-0.1.0}
    ports:
      - "8086:8086"
      - "9086:9086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

volumes:
  postgres-data:
  minio-data:
  valkey-data:
