spring:
  devtools:
    restart:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/eprise_ai}
    username: ${SPRING_DATASOURCE_USERNAME:eprise}
    password: ${SPRING_DATASOURCE_PASSWORD:eprise}
  cloud:
    kubernetes:
      discovery:
        enabled: true
grpc:
  client:
    retrieval-service:
      address: 'dns:///eprise-retrieval-service:9083'
      negotiation-type: plaintext
