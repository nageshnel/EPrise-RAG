spring:
  devtools:
    restart:
      enabled: false
  kafka:
    bootstrap-servers: kafka:9092
ai:
  minio:
    url: ${MINIO_URL:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:eprise}
    secret-key: ${MINIO_SECRET_KEY:eprise-password}
grpc:
  client:
    ocr-service:
      address: 'dns:///eprise-ocr-service:9086'
      negotiation-type: plaintext
